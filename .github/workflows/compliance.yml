name: Compliance Gate

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly regression runs (UTC): Monday and Thursday at 05:00
    - cron: "0 5 * * 1,4"
  workflow_dispatch:
    inputs:
      protected_run:
        description: "Enforce protected branch context controls"
        required: false
        type: boolean
        default: false

jobs:
  run-compliance:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: src
      GITHUB_REF_PROTECTED: ${{ github.ref_protected }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: pytest -q

      - name: Generate sample certificate
        run: |
          openssl req -x509 -newkey rsa:2048 -sha256 -days 90 -nodes \
            -keyout /tmp/certguard.key \
            -out /tmp/certguard.pem \
            -subj "/CN=example.com" \
            -addext "subjectAltName=DNS:example.com,DNS:www.example.com"

      - name: Run compliance engine (standard)
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.protected_run != true }}
        run: |
          python src/main.py \
            --cert /tmp/certguard.pem \
            --policy policies/cabf_policy.yaml \
            --report reports/compliance_report.json \
            --evidence-dir audit_evidence

      - name: Run compliance engine (protected mode)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.protected_run == true }}
        run: |
          python src/main.py \
            --cert /tmp/certguard.pem \
            --policy policies/cabf_policy.yaml \
            --report reports/compliance_report.json \
            --evidence-dir audit_evidence \
            --protected-run

      - name: Generate reviewer summary
        run: |
          python src/main.py \
            --mode summary \
            --report-input reports/compliance_report.json \
            --summary-output reports/compliance_summary.md

      - name: Upload compliance artifacts
        uses: actions/upload-artifact@v4
        with:
          name: certguard-compliance-artifacts
          path: |
            reports/compliance_report.json
            reports/compliance_report.json.seal
            reports/compliance_summary.md
            audit_evidence/policy_checks.json
            audit_evidence/lint_results.json
