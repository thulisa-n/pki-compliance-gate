name: Compliance Gate

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly regression runs (UTC): Monday and Thursday at 05:00
    - cron: "0 5 * * 1,4"
  workflow_dispatch:
    inputs:
      protected_run:
        description: "Enforce protected branch context controls"
        required: false
        type: boolean
        default: false

jobs:
  run-compliance:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: src
      GITHUB_REF_PROTECTED: ${{ github.ref_protected }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install cyclonedx-bom

      - name: Install zlint
        run: |
          curl -sL https://github.com/zmap/zlint/releases/download/v0.4.10/zlint-linux-amd64 -o /usr/local/bin/zlint
          chmod +x /usr/local/bin/zlint
          zlint --version || echo "zlint installed"

      - name: Install OPA
        run: |
          curl -sL https://openpolicyagent.org/downloads/v1.4.2/opa_linux_amd64_static -o /usr/local/bin/opa
          chmod +x /usr/local/bin/opa
          opa version

      - name: Run unit tests
        run: pytest -q

      - name: Generate sample certificate
        run: |
          openssl req -x509 -newkey rsa:2048 -sha256 -days 90 -nodes \
            -keyout /tmp/certguard.key \
            -out /tmp/certguard.pem \
            -subj "/CN=example.com" \
            -addext "subjectAltName=DNS:example.com,DNS:www.example.com"

      - name: Run compliance engine (standard)
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.protected_run != true }}
        run: |
          python src/main.py \
            --cert /tmp/certguard.pem \
            --policy policies/cabf_policy.yaml \
            --report reports/compliance_report.json \
            --evidence-dir audit_evidence

      - name: Run compliance engine (protected mode)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.protected_run == true }}
        run: |
          python src/main.py \
            --cert /tmp/certguard.pem \
            --policy policies/cabf_policy.yaml \
            --report reports/compliance_report.json \
            --evidence-dir audit_evidence \
            --protected-run

      - name: Run compliance engine with zlint + OPA enabled
        run: |
          python src/main.py \
            --cert /tmp/certguard.pem \
            --policy policies/profiles/ci_lint_gate.yaml \
            --report reports/compliance_report_with_lint.json \
            --evidence-dir audit_evidence_lint

      - name: Verify zlint ran in lint evidence
        run: |
          python -c "
          import json, sys
          lint = json.load(open('audit_evidence_lint/lint_results.json'))
          zlint_status = lint.get('controls', {}).get('zlint', {}).get('status', 'missing')
          opa = json.load(open('audit_evidence_lint/opa_results.json'))
          opa_status = opa.get('status', 'missing')
          print(f'zlint: {zlint_status}')
          print(f'opa: {opa_status}')
          if zlint_status == 'skipped':
              print('ERROR: zlint was skipped - binary may not be installed')
              sys.exit(1)
          if opa_status == 'skipped':
              print('ERROR: OPA was skipped - binary may not be installed')
              sys.exit(1)
          print('Both integrations confirmed active')
          "

      - name: Generate reviewer summary
        run: |
          python src/main.py \
            --mode summary \
            --report-input reports/compliance_report.json \
            --summary-output reports/compliance_summary.md

      - name: Generate trend snapshot
        run: |
          python src/main.py \
            --mode trend \
            --report-input reports/compliance_report.json \
            --trend-output reports/compliance_trend_snapshot.json

      - name: Generate SBOM (CycloneDX)
        run: |
          cyclonedx-py requirements requirements.txt \
            --output-format JSON \
            --output-reproducible \
            --output-file reports/sbom.cdx.json

      - name: Generate signed release provenance + verify signature
        run: |
          python - <<'PY'
          from pathlib import Path
          from certguard.artifact_signing import generate_ed25519_keypair_b64
          from certguard.release_provenance import generate_release_provenance
          from certguard.release_provenance import verify_release_provenance_signature
          artifacts = [
              Path("reports/compliance_report.json"),
              Path("reports/compliance_report.json.seal"),
              Path("reports/compliance_summary.md"),
              Path("reports/compliance_trend_snapshot.json"),
              Path("reports/sbom.cdx.json"),
              Path("audit_evidence/policy_checks.json"),
              Path("audit_evidence/lint_results.json"),
              Path("audit_evidence/waiver_results.json"),
              Path("audit_evidence/opa_results.json"),
              Path("audit_evidence/evidence_manifest.json"),
              Path("audit_evidence/compliance_decisions.jsonl"),
          ]
          private_key_b64, public_key_b64 = generate_ed25519_keypair_b64()
          manifest_path, _, signature_path = generate_release_provenance(
              artifact_paths=artifacts,
              output_path=Path("reports/release_provenance.json"),
              signing_private_key_b64=private_key_b64,
              signing_public_key_b64=public_key_b64,
          )
          if signature_path is None:
              raise SystemExit("Expected signed provenance output, got none.")
          if not verify_release_provenance_signature(
              manifest_path,
              signature_path,
              public_key_b64,
          ):
              raise SystemExit("Release provenance signature verification failed.")
          Path("reports/release_signing_public_key.b64").write_text(
              public_key_b64,
              encoding="utf-8",
          )
          PY

      - name: Prepare traceable artifact bundle
        run: |
          mkdir -p "artifacts/${GITHUB_RUN_ID}"
          cp reports/compliance_report.json "artifacts/${GITHUB_RUN_ID}/"
          cp reports/compliance_report.json.seal "artifacts/${GITHUB_RUN_ID}/"
          cp reports/compliance_summary.md "artifacts/${GITHUB_RUN_ID}/"
          cp reports/compliance_trend_snapshot.json "artifacts/${GITHUB_RUN_ID}/"
          cp reports/sbom.cdx.json "artifacts/${GITHUB_RUN_ID}/"
          cp reports/release_provenance.json "artifacts/${GITHUB_RUN_ID}/"
          cp reports/release_provenance.json.digest "artifacts/${GITHUB_RUN_ID}/"
          cp reports/release_provenance.json.sig "artifacts/${GITHUB_RUN_ID}/"
          cp reports/release_provenance.json.sig.meta.json "artifacts/${GITHUB_RUN_ID}/"
          cp reports/release_signing_public_key.b64 "artifacts/${GITHUB_RUN_ID}/"
          cp audit_evidence/policy_checks.json "artifacts/${GITHUB_RUN_ID}/"
          cp audit_evidence/lint_results.json "artifacts/${GITHUB_RUN_ID}/"
          cp audit_evidence/waiver_results.json "artifacts/${GITHUB_RUN_ID}/"
          cp audit_evidence/opa_results.json "artifacts/${GITHUB_RUN_ID}/"
          cp audit_evidence/evidence_manifest.json "artifacts/${GITHUB_RUN_ID}/"
          cp audit_evidence/compliance_decisions.jsonl "artifacts/${GITHUB_RUN_ID}/"

      - name: Upload compliance artifacts
        uses: actions/upload-artifact@v7
        with:
          name: certguard-compliance-artifacts-${{ github.run_id }}
          path: |
            artifacts/${{ github.run_id }}

  fixture-matrix:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: src
    strategy:
      fail-fast: false
      matrix:
        include:
          - fixture: tests/certificates/valid_cert.pem
            expected_exit: 0
          - fixture: tests/certificates/internal_domain_cert.pem
            expected_exit: 2
          - fixture: tests/certificates/long_validity_cert.pem
            expected_exit: 2
          - fixture: tests/certificates/no_san_cert.pem
            expected_exit: 2
          - fixture: tests/certificates/weak_key_cert.pem
            expected_exit: 3
          - fixture: tests/certificates/sha1_cert.pem
            expected_exit: 3
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Evaluate fixture scenario
        run: |
          set +e
          python src/main.py --cert "${{ matrix.fixture }}" --output json > /tmp/matrix_result.json
          exit_code=$?
          echo "Fixture: ${{ matrix.fixture }}"
          echo "Expected: ${{ matrix.expected_exit }}"
          echo "Actual: ${exit_code}"
          if [ "${exit_code}" -ne "${{ matrix.expected_exit }}" ]; then
            echo "Matrix validation failed for ${{ matrix.fixture }}"
            cat /tmp/matrix_result.json || true
            exit 1
          fi

  strict-profile-smoke:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: src
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Evaluate strict profile baseline
        run: |
          set +e
          python src/main.py \
            --cert tests/certificates/valid_cert.pem \
            --policy policies/profiles/root_program_baseline.yaml \
            --output json > /tmp/strict_profile_result.json
          exit_code=$?
          echo "Strict profile exit: ${exit_code}"
          if [ "${exit_code}" -eq 0 ]; then
            echo "Expected non-zero exit for strict profile without attestations/tooling."
            cat /tmp/strict_profile_result.json || true
            exit 1
          fi
