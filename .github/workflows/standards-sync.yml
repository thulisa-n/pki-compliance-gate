name: Standards Sync

on:
  schedule:
    - cron: "0 6 * * 2"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-cabf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install sync dependencies
        run: pip install pyyaml

      - name: Sync CAB Forum baseline snapshot
        run: python scripts/sync_cabf_baseline.py

      - name: Create pull request if sync changed
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "chore(standards): sync CAB Forum baseline snapshot"
          title: "chore(standards): sync CAB Forum baseline snapshot"
          body: |
            ## Summary
            - sync CA/B Forum BR snapshot from upstream source
            - refresh `policies/standards_baseline.yaml`
            - update generated `policies/standards_sync_snapshot.yaml`
          branch: chore/standards-sync
          base: main
          delete-branch: true

      - name: Capture sync artifacts
        if: always()
        run: |
          mkdir -p artifacts/standards-sync
          cp policies/standards_baseline.yaml artifacts/standards-sync/ 2>/dev/null || true
          cp policies/standards_sync_snapshot.yaml artifacts/standards-sync/ 2>/dev/null || true
          git status --short > artifacts/standards-sync/git-status.txt

      - name: Upload standards sync artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: standards-sync-artifacts-${{ github.run_id }}
          path: artifacts/standards-sync
          if-no-files-found: warn
