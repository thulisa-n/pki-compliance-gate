name: Standards Sync

on:
  schedule:
    - cron: "0 6 * * 2"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: standards-sync-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync-cabf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.11"

      - name: Install sync dependencies
        run: pip install PyYAML==6.0.3

      - name: Resolve CAB Forum source commit
        id: source
        run: |
          set -euo pipefail
          source_sha="$(git ls-remote https://github.com/cabforum/servercert.git refs/heads/main | awk '{print $1}')"
          if [ -z "${source_sha}" ]; then
            echo "Unable to resolve CAB Forum source commit SHA."
            exit 1
          fi
          echo "sha=${source_sha}" >> "$GITHUB_OUTPUT"

      - name: Sync CAB Forum baseline snapshot
        run: |
          python scripts/sync_cabf_baseline.py \
            --source-url "https://raw.githubusercontent.com/cabforum/servercert/${{ steps.source.outputs.sha }}/docs/BR.md"

      - name: Create pull request if sync changed
        uses: peter-evans/create-pull-request@v8
        with:
          # Use a repo secret token (classic PAT or fine-grained PAT) so follow-up
          # PR workflows (Compliance Gate, Security Scans) trigger automatically.
          # If not configured, fallback to github.token (checks may not auto-trigger).
          token: ${{ secrets.STANDARDS_SYNC_PR_TOKEN != '' && secrets.STANDARDS_SYNC_PR_TOKEN || github.token }}
          commit-message: "chore(standards): sync CAB Forum baseline snapshot"
          title: "chore(standards): sync CAB Forum baseline snapshot"
          body: |
            ## Summary
            - sync CA/B Forum BR snapshot from upstream source
            - refresh `policies/standards_baseline.yaml`
            - update generated `policies/standards_sync_snapshot.yaml`
            - note: auto-run PR checks require `STANDARDS_SYNC_PR_TOKEN` secret
          branch: chore/standards-sync
          base: main
          delete-branch: true

      - name: Capture sync artifacts
        if: always()
        run: |
          mkdir -p artifacts/standards-sync
          cp policies/standards_baseline.yaml artifacts/standards-sync/ 2>/dev/null || true
          cp policies/standards_sync_snapshot.yaml artifacts/standards-sync/ 2>/dev/null || true
          git status --short > artifacts/standards-sync/git-status.txt

      - name: Upload standards sync artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: standards-sync-artifacts-${{ github.run_id }}
          path: artifacts/standards-sync
          if-no-files-found: warn
