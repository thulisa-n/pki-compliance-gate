name: Kyverno Policy Tests

on:
  pull_request:
    paths:
      - "deployments/kyverno/**"
      - ".github/workflows/kyverno-policy.yml"
  push:
    branches: [main]
    paths:
      - "deployments/kyverno/**"
      - ".github/workflows/kyverno-policy.yml"
  workflow_dispatch:

jobs:
  kyverno-cli-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Kyverno CLI
        uses: kyverno/action-install-cli@v0.2.0
        with:
          release: v1.17.0

      - name: Verify Kyverno CLI install
        run: kyverno version

      - name: Run Kyverno test suite
        run: kyverno test deployments/kyverno/tests
