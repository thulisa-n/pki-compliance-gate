metadata:
  standard: "CA/Browser Forum Baseline Requirements"
  version: "1.0.0"
  last_updated: "2026-03-16"
  terms: "CABF Baseline Requirements policy profile for CertGuard MVP"

terms:
  - id: "CABF-BR-6.3.2"
    title: "Certificate Validity Period"
    summary: "Subscriber certificates SHALL NOT exceed 398 days; CertGuard MVP uses 200 days."
  - id: "CABF-BR-7.1.2"
    title: "Subject Alternative Name Required"
    summary: "All certificates MUST include at least one SAN value."
  - id: "CABF-BR-7.1.3"
    title: "Prohibited Signature Algorithms"
    summary: "SHA-1 and MD5 SHALL NOT be used for signing subscriber certificates."
  - id: "CABF-BR-6.1.5"
    title: "Minimum Key Size"
    summary: "RSA keys MUST be at least 2048 bits."
  - id: "CABF-BR-7.1.4.2"
    title: "Internal Name Prohibition"
    summary: "Certificates SHALL NOT contain internal server names or reserved IP addresses."
  - id: "CABF-BR-3.2.2.4"
    title: "Domain Control Validation"
    summary: "CAs MUST verify applicant control of the domain using approved DCV methods."

certificate:
  max_validity_days: 200
  require_san: true

key:
  minimum_rsa_bits: 2048

signature:
  prohibited_algorithms:
    - sha1
    - md5

domains:
  forbid_internal_names: true
  blocked_suffixes:
    - ".local"
    - ".internal"
    - ".intranet"

lint:
  # Default profile remains tool-portable for local/offline runs; CI lint profile
  # (`policies/profiles/ci_lint_gate.yaml`) enforces zlint with fail-closed behavior.
  enable_zlint: false
  fail_on_error: true
  fail_severities:
    - "error"
    - "fatal"
  # Disabled in baseline profile to avoid OpenSSL CLI dependency for local dry runs.
  # Enabled in CI lint profile where the binary is installed and version-pinned.
  enable_asn1parse: false
  fail_on_asn1_error: true

dcv:
  # Staged rollout: baseline enforces cert structure first. Set true when your
  # issuance pipeline consistently provides `--dcv-attestation` evidence.
  required: false
  allowed_methods:
    - "dns-01"
    - "http-01"
    - "tls-alpn-01"
  max_age_days: 30

rfc5280:
  # Optional strict-profile checks are disabled in baseline for gradual adoption.
  # Enable in hardened profiles when issuer-chain evidence is available in CI.
  require_end_entity_not_ca: false
  require_key_usage: false
  required_key_usages:
    - "digital_signature"
    - "key_encipherment"
  require_subject_key_identifier: false
  require_authority_key_identifier: false
  allowed_critical_extensions:
    - "2.5.29.15"   # Key Usage
    - "2.5.29.19"   # Basic Constraints
    - "2.5.29.17"   # Subject Alternative Name (when marked critical)
    - "2.5.29.32"   # Certificate Policies
  require_path_issuer_subject_match: false
  require_path_aki_ski_match: false

opa:
  # OPA gate is optional in baseline; enabled in CI lint profile for policy-as-code.
  enabled: false
  policy_file: "policies/rego/validity.rego"

issuance:
  # Disabled until issuance attestation plumbing is consistently available.
  require_hsm_attestation: false
  min_fips_level: 2

crypto_transition:
  # Transition profile stays opt-in; enable when your program explicitly enforces
  # post-baseline crypto agility controls in issuance.
  enabled: false
  # CABF staged validity direction is 200 -> 100 -> 47 days; use 47 as end-state target.
  target_max_validity_days: 47
  target_min_rsa_bits: 3072
  approved_signature_algorithms:
    - "sha256"
    - "sha384"
    - "sha512"
