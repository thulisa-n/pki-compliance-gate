metadata:
  standard: "CA/Browser Forum Baseline Requirements"
  version: "1.0.0"
  last_updated: "2026-03-16"
  terms: "CABF Baseline Requirements policy profile for CertGuard MVP"

terms: []

certificate:
  max_validity_days: 398
  require_san: true

key:
  minimum_rsa_bits: 2048

signature:
  prohibited_algorithms:
    - sha1
    - md5

domains:
  forbid_internal_names: true
  blocked_suffixes:
    - ".local"
    - ".internal"
    - ".intranet"

lint:
  enable_zlint: false
  fail_on_error: true
  fail_severities:
    - "error"
    - "fatal"

dcv:
  required: false
  allowed_methods:
    - "dns-01"
    - "http-01"
    - "tls-alpn-01"
  max_age_days: 30

rfc5280:
  require_end_entity_not_ca: false
  require_key_usage: false
  required_key_usages:
    - "digital_signature"
    - "key_encipherment"

opa:
  enabled: false
  policy_file: "policies/rego/validity.rego"
