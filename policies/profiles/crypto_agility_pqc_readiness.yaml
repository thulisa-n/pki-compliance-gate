metadata:
  standard: "Crypto-Agility and PQC Readiness Profile"
  version: "2026.1"
  last_updated: "2026-04-10"
  terms: "Transition profile for short-lived certificates and stronger cryptographic baselines."

terms:
  - id: "NIST-PQC-2024"
    title: "Post-Quantum Cryptography Transition"
    summary: "Organizations SHOULD begin migrating to quantum-safe algorithms per NIST PQC guidance."
  - id: "CABF-BR-6.1.5-TRANSITION"
    title: "Transitional RSA Key Size"
    summary: "RSA keys SHOULD be at least 3072 bits during cryptographic transition periods."
  - id: "CRYPTO-AGILITY-1"
    title: "Algorithm Agility Readiness"
    summary: "Systems MUST support configurable approved signature algorithm lists for migration."

certificate:
  max_validity_days: 90
  require_san: true

key:
  minimum_rsa_bits: 3072

signature:
  prohibited_algorithms:
    - sha1
    - md5

domains:
  forbid_internal_names: true
  blocked_suffixes:
    - ".local"
    - ".internal"
    - ".intranet"

lint:
  enable_zlint: true
  fail_on_error: true
  fail_severities:
    - "error"
    - "fatal"
  enable_asn1parse: true
  fail_on_asn1_error: true

dcv:
  required: true
  allowed_methods:
    - "dns-01"
    - "http-01"
    - "tls-alpn-01"
  max_age_days: 15

rfc5280:
  require_end_entity_not_ca: true
  require_key_usage: true
  required_key_usages:
    - "digital_signature"
    - "key_encipherment"
  require_subject_key_identifier: true
  require_authority_key_identifier: true
  allowed_critical_extensions:
    - "2.5.29.15"
    - "2.5.29.19"
    - "2.5.29.37"
  require_path_issuer_subject_match: true
  require_path_aki_ski_match: true

opa:
  enabled: false
  policy_file: "policies/rego/validity.rego"

issuance:
  require_hsm_attestation: true
  min_fips_level: 3

crypto_transition:
  enabled: true
  target_max_validity_days: 90
  target_min_rsa_bits: 3072
  approved_signature_algorithms:
    - "sha256"
    - "sha384"
    - "sha512"
