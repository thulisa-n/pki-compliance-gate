metadata:
  standard: "Root Program Policy Baseline"
  version: "2026.1"
  last_updated: "2026-04-01"
  terms: "Root program policy profile for CertGuard pre-issuance simulation"

terms:
  - id: "MRSP-2.1"
    title: "Root Key Material Security"
    summary: "Root CA keys MUST be generated and stored in FIPS 140-2/3 Level 3 HSMs."
  - id: "MRSP-5.1"
    title: "Subscriber Certificate Validity"
    summary: "Root programs require subscriber certificates to align with BR maximum validity."
  - id: "MRSP-5.3"
    title: "Minimum Cryptographic Standards"
    summary: "RSA keys MUST be at least 3072 bits for new subscriber certificates."
  - id: "MRSP-7.1"
    title: "Audit and Compliance"
    summary: "CAs MUST maintain auditable evidence of all issuance and lifecycle operations."

certificate:
  max_validity_days: 200
  require_san: true

key:
  minimum_rsa_bits: 3072

signature:
  prohibited_algorithms:
    - sha1
    - md5

domains:
  forbid_internal_names: true
  blocked_suffixes:
    - ".local"
    - ".internal"
    - ".intranet"

lint:
  enable_zlint: true
  fail_on_error: true
  fail_severities:
    - "error"
    - "fatal"
  enable_asn1parse: true
  fail_on_asn1_error: true

dcv:
  required: true
  allowed_methods:
    - "dns-01"
    - "http-01"
    - "tls-alpn-01"
  max_age_days: 15

rfc5280:
  require_end_entity_not_ca: true
  require_key_usage: true
  required_key_usages:
    - "digital_signature"
    - "key_encipherment"
  require_subject_key_identifier: true
  require_authority_key_identifier: true
  allowed_critical_extensions:
    - "2.5.29.15"
    - "2.5.29.19"
    - "2.5.29.37"
  require_path_issuer_subject_match: true
  require_path_aki_ski_match: true

opa:
  enabled: false
  policy_file: "policies/rego/validity.rego"

issuance:
  require_hsm_attestation: true
  min_fips_level: 3
