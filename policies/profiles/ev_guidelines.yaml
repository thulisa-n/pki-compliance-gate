metadata:
  standard: "CA/Browser Forum EV Guidelines"
  version: "2026.1"
  last_updated: "2026-04-01"
  terms: "EV profile overlay for CertGuard policy-as-code simulation"

terms:
  - id: "CABF-EVG-9.2.1"
    title: "EV Certificate Validity Period"
    summary: "EV subscriber certificates SHALL NOT exceed 398 days."
  - id: "CABF-EVG-9.8"
    title: "EV Subject Identity Validation"
    summary: "CAs MUST verify the identity and authority of the certificate applicant."
  - id: "CABF-EVG-11.2"
    title: "EV Domain Control Validation"
    summary: "CAs MUST verify domain control using approved methods before EV issuance."
  - id: "CABF-EVG-8.1"
    title: "EV Private Key Protection"
    summary: "EV subscriber key pairs MUST be generated in a secure manner with HSM backing."

certificate:
  max_validity_days: 200
  require_san: true

key:
  minimum_rsa_bits: 2048

signature:
  prohibited_algorithms:
    - sha1
    - md5

domains:
  forbid_internal_names: true
  blocked_suffixes:
    - ".local"
    - ".internal"
    - ".intranet"

lint:
  enable_zlint: true
  fail_on_error: true
  fail_severities:
    - "error"
    - "fatal"
  enable_asn1parse: true
  fail_on_asn1_error: true

dcv:
  required: true
  allowed_methods:
    - "dns-01"
    - "http-01"
    - "tls-alpn-01"
  max_age_days: 30

rfc5280:
  require_end_entity_not_ca: true
  require_key_usage: true
  required_key_usages:
    - "digital_signature"
    - "key_encipherment"
  require_subject_key_identifier: true
  require_authority_key_identifier: true
  allowed_critical_extensions:
    - "2.5.29.15"
    - "2.5.29.19"
  require_path_issuer_subject_match: true
  require_path_aki_ski_match: true

opa:
  enabled: false
  policy_file: "policies/rego/validity.rego"

issuance:
  require_hsm_attestation: true
  min_fips_level: 2
